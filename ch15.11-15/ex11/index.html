<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OneDrive File Uploader</title>
    <style>
      body {
        font-family:
          system-ui,
          -apple-system,
          "Segoe UI",
          Roboto,
          Arial,
          sans-serif;
        max-width: 640px;
        margin: 40px auto;
        padding: 0 16px;
        line-height: 1.5;
        color: #111;
      }

      h1 {
        font-size: 20px;
        margin: 0 0 16px;
      }

      .hint {
        font-size: 13px;
        color: #555;
        margin: 0 0 18px;
      }

      .hint a {
        color: inherit;
      }

      label {
        display: block;
        font-weight: 600;
        margin-top: 14px;
        margin-bottom: 6px;
      }

      input[type="text"],
      input[type="file"] {
        width: 100%;
        padding: 10px 12px;
        border: 1px solid #ccc;
        border-radius: 6px;
        font-size: 14px;
        box-sizing: border-box;
      }

      input[type="text"]:focus,
      input[type="file"]:focus {
        outline: none;
        border-color: #666;
      }

      button {
        width: 100%;
        margin-top: 16px;
        padding: 10px 12px;
        border: 1px solid #111;
        border-radius: 6px;
        background: #111;
        color: #fff;
        cursor: pointer;
        font-size: 14px;
      }

      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .file-info {
        margin-top: 8px;
        font-size: 13px;
        color: #555;
      }

      #status {
        margin-top: 16px;
        padding: 10px 12px;
        border-radius: 6px;
        border: 1px solid #ddd;
        display: none;
        font-size: 14px;
      }

      #status.success {
        display: block;
        border-color: #b7e1c1;
        background: #eef9f1;
      }

      #status.error {
        display: block;
        border-color: #f2b8b5;
        background: #fdeeee;
      }

      #status.loading {
        display: block;
        border-color: #e6d39a;
        background: #fff7e6;
      }
    </style>
  </head>

  <body>
    <h1>OneDrive File Uploader</h1>
    <p class="hint">
      アクセストークンは
      <a
        href="https://developer.microsoft.com/en-us/graph/graph-explorer"
        target="_blank"
        rel="noreferrer"
        >Graph Explorer</a
      >
      で取得してください（Files.ReadWrite を許可）。
    </p>

    <form id="uploadForm">
      <label for="accessToken">アクセストークン *</label>
      <input
        type="text"
        id="accessToken"
        placeholder="Graph Explorerから取得したアクセストークンを入力"
        required
      />

      <label for="fileName">ファイル名（オプション）</label>
      <input
        type="text"
        id="fileName"
        placeholder="空欄の場合は元のファイル名を使用"
      />

      <label for="file">アップロードするファイル *</label>
      <input type="file" id="file" required />
      <div class="file-info" id="fileInfo"></div>

      <button type="submit" id="uploadButton">アップロード</button>
    </form>

    <div id="status"></div>

    <script src="index.js"></script>
  </body>
</html>
