<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>inline-circle sample</title>
    <script src="index.js" defer></script>
  </head>
  <body>
    <p>
      通常の円:
      <inline-circle></inline-circle>
    </p>

    <p>
      枠線を赤にした円:
      <inline-circle border-color="red"></inline-circle>

    <p>

      <inline-circle border-color="blue"></inline-circle>
    </p>
  </body>
</html>
